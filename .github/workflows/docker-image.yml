name: Publish Docker Image

on:
  workflow_call:
    inputs:
      tag:
        description: 'Single tag to publish (optional, uses latest commit if empty)'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      tag:
        description: 'Single tag to publish, for example v0.1.4.post6 (optional)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    
    outputs:
      build_tag: ${{ steps.prepare.outputs.build_tag }}

    steps:
      - name: 📋 Prepare build configuration
        id: prepare
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "🏷️ Building from TAG: ${{ inputs.tag }}"
            echo "build_tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
            echo "ref=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "🔀 Building from LATEST commit (HEAD)"
            echo "build_tag=latest-dev" >> $GITHUB_OUTPUT
            echo "ref=" >> $GITHUB_OUTPUT
          fi

      - name: Report selected tag
        run: |
          echo "=========================================="
          echo "📦 Publishing Docker Image"
          echo "📍 Source: ${{ inputs.tag && format('Tag {0}', inputs.tag) || 'Latest Commit (HEAD)' }}"
          echo "🏷️ Image Tag: ${{ steps.prepare.outputs.build_tag }}"
          echo "=========================================="

      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.prepare.outputs.ref }}
          fetch-depth: 0

      - name: Show git info
        run: |
          echo "Current commit: $(git rev-parse HEAD)"
          git log -1 --format="%h %s (%an, %ar)"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/nanobot
          # 🔑 关键修改：latest 始终存在！
          tags: |
            type=raw,value=${{ steps.prepare.outputs.build_tag }}
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_TAG=${{ steps.prepare.outputs.build_tag }}
            GIT_COMMIT=${{ github.sha }}

      - name: Print summary
        run: |
          echo "✅ Build completed!"
          echo ""
          echo "📋 Image Tags:"
          echo "   • ${{ steps.prepare.outputs.build_tag }}"
          echo "   • latest ⬅️ 始终更新为最新镜像"
          echo "   • sha-${GITHUB_SHA::7}"
