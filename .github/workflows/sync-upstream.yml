name: Sync Upstream

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      tags_changed: ${{ steps.upstream_changes.outputs.tags_changed }}
      new_tags_json: ${{ steps.upstream_changes.outputs.new_tags_json }}
    env:
      DEFAULT_BRANCH: main
      UPSTREAM_REPO: HKUDS/nanobot

    steps:
    - name: Check out fork
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ env.DEFAULT_BRANCH }}
        token: ${{ secrets.SYNC_UPSTREAM_TOKEN != '' && secrets.SYNC_UPSTREAM_TOKEN || github.token }}

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Add upstream remote
      run: |
        git remote remove upstream 2>/dev/null || true
        git remote add upstream https://github.com/${UPSTREAM_REPO}.git

    - name: Fetch upstream branch and tags
      run: |
        git fetch upstream "${DEFAULT_BRANCH}"
        git fetch origin --force '+refs/tags/*:refs/origin-tags/*'
        git fetch upstream --force '+refs/tags/*:refs/upstream-tags/*'

    - name: Detect upstream changes
      id: upstream_changes
      shell: bash
      run: |
        set -euo pipefail

        new_tags_file="${RUNNER_TEMP}/new-upstream-tags.txt"
        moved_tags_file="${RUNNER_TEMP}/moved-upstream-tags.txt"

        : > "${new_tags_file}"
        : > "${moved_tags_file}"

        if [ "$(git rev-parse HEAD)" = "$(git rev-parse upstream/${DEFAULT_BRANCH})" ]; then
          echo "branch_changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "branch_changed=true" >> "$GITHUB_OUTPUT"
        fi

        while IFS= read -r upstream_ref; do
          tag="${upstream_ref#refs/upstream-tags/}"
          upstream_oid="$(git rev-parse "${upstream_ref}")"
          origin_ref="refs/origin-tags/${tag}"

          if ! git rev-parse --verify -q "${origin_ref}" >/dev/null; then
            printf '%s\n' "${tag}" >> "${new_tags_file}"
            continue
          fi

          origin_oid="$(git rev-parse "${origin_ref}")"
          if [ "${origin_oid}" != "${upstream_oid}" ]; then
            printf '%s\n' "${tag}" >> "${moved_tags_file}"
          fi
        done < <(git for-each-ref --format='%(refname)' refs/upstream-tags)

        new_tag_count="$(wc -l < "${new_tags_file}" | tr -d ' ')"
        moved_tag_count="$(wc -l < "${moved_tags_file}" | tr -d ' ')"

        echo "new_tags_file=${new_tags_file}" >> "$GITHUB_OUTPUT"
        echo "moved_tags_file=${moved_tags_file}" >> "$GITHUB_OUTPUT"
        echo "new_tag_count=${new_tag_count}" >> "$GITHUB_OUTPUT"
        echo "moved_tag_count=${moved_tag_count}" >> "$GITHUB_OUTPUT"
        echo "new_tags_json=$(jq -Rsc 'split(\"\n\") | map(select(length > 0))' < "${new_tags_file}")" >> "$GITHUB_OUTPUT"

        if [ "${new_tag_count}" -gt 0 ]; then
          echo "tags_changed=true" >> "$GITHUB_OUTPUT"
        else
          echo "tags_changed=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Merge upstream main
      if: steps.upstream_changes.outputs.branch_changed == 'true'
      run: |
        git merge --no-edit "upstream/${DEFAULT_BRANCH}" || {
          git merge --abort || true
          echo "Automatic sync failed because upstream/${DEFAULT_BRANCH} has conflicts with this fork." >&2
          exit 1
        }

    - name: Push synced main
      if: steps.upstream_changes.outputs.branch_changed == 'true'
      run: git push origin "HEAD:${DEFAULT_BRANCH}"

    - name: Fail on moved upstream tags
      if: steps.upstream_changes.outputs.moved_tag_count != '0'
      shell: bash
      run: |
        echo "Upstream retagged existing tag(s); refusing to force-update tags on the fork:" >&2
        cat "${{ steps.upstream_changes.outputs.moved_tags_file }}" >&2
        exit 1

    - name: Push new upstream tags
      if: steps.upstream_changes.outputs.tags_changed == 'true'
      shell: bash
      run: |
        set -euo pipefail
        while IFS= read -r tag; do
          [ -n "${tag}" ] || continue
          git update-ref "refs/tags/${tag}" "$(git rev-parse "refs/upstream-tags/${tag}")"
          git push origin "refs/tags/${tag}:refs/tags/${tag}"
        done < "${{ steps.upstream_changes.outputs.new_tags_file }}"

    - name: Warn about downstream workflow triggers
      if: steps.upstream_changes.outputs.tags_changed == 'true' && secrets.SYNC_UPSTREAM_TOKEN == ''
      run: |
        echo "::warning::New upstream tags were synced, but they were pushed with GITHUB_TOKEN. GitHub will not trigger other workflows from those tag pushes. Add a repo secret named SYNC_UPSTREAM_TOKEN with a PAT or GitHub App token if you want tag pushes to trigger downstream workflows."

    - name: Report no changes
      if: steps.upstream_changes.outputs.branch_changed == 'false' && steps.upstream_changes.outputs.tags_changed == 'false'
      run: echo "Fork is already up to date with upstream branch and tags."

  publish_docker:
    needs: sync
    if: needs.sync.outputs.tags_changed == 'true'
    uses: ./.github/workflows/docker-image.yml
    with:
      tags_json: ${{ needs.sync.outputs.new_tags_json }}
